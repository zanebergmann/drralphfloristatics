let activeFilter = 'all', modalContext = null;

function loadSaved() {
  try {
    const saved = localStorage.getItem('statics_user_resources');
    if (!saved) return;
    JSON.parse(saved).forEach((u, i) => {
      if (!UNITS[i]) return;
      (u.worksheets||[]).forEach(r => UNITS[i].worksheets.push({...r, _user:true}));
      (u.cribsheets||[]).forEach(r => UNITS[i].cribsheets.push({...r, _user:true}));
      (u.videos||[]).forEach(r => UNITS[i].videos.push({...r, _user:true}));
    });
  } catch(e){}
}
function saveUserAdded() {
  try {
    const data = UNITS.map(u => ({
      worksheets: u.worksheets.filter(r=>r._user),
      cribsheets: u.cribsheets.filter(r=>r._user),
      videos:     u.videos.filter(r=>r._user)
    }));
    localStorage.setItem('statics_user_resources', JSON.stringify(data));
  } catch(e){}
}

function renderItems(items, cls, icon, ui, key) {
  if (!items.length) return `<span class="placeholder-row">None yet — add one below.</span>`;
  return items.map((r,ri) =>
    `<a class="res-item ${cls}" href="${r.url}" target="_blank">${icon}<span>${r.name}</span>${r._user?`<button class="rm-btn" onclick="removeResource(event,${ui},'${key}',${ri})" title="Remove">×</button>`:''}</a>`
  ).join('');
}

function renderUnit(u, i) {
  const wc=u.worksheets.length, cc=u.cribsheets.length, vc=u.videos.length;
  const badges=[wc?`<span class="count-badge count-ws">${wc} WS</span>`:'', cc?`<span class="count-badge count-cs">${cc} CS</span>`:'', vc?`<span class="count-badge count-vid">${vc} ▶</span>`:''].join('');
  return `<div class="unit" id="unit-${i}">
    <div class="unit-header" onclick="toggleUnit(${i})">
      <span class="unit-num">Unit ${u.num}</span>
      <span class="unit-title">${u.title}</span>
      <span class="unit-meta">${badges}</span>
      <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="unit-body">
      <div class="topics-list">
        <div class="topics-label">Topics Covered</div>
        <div class="topics-pills">${u.topics.map(t=>`<span class="topic-pill">${t}</span>`).join('')}</div>
      </div>
      <div class="resources">
        <div class="res-section"><div class="res-label">📄 Worksheets &amp; Problem Sets</div><div class="res-items">${renderItems(u.worksheets,'worksheet',iconPDF,i,'worksheets')}</div></div>
        <div class="res-section"><div class="res-label">📋 Crib Sheets</div><div class="res-items">${renderItems(u.cribsheets,'cribsheet',iconPDF,i,'cribsheets')}</div></div>
        <div class="res-section"><div class="res-label">▶ Video Lectures</div><div class="res-items">${renderItems(u.videos,'video',iconVid,i,'videos')}</div></div>
        <div class="add-resource">
          <button class="add-btn ws" onclick="openModal(${i},'worksheet')">+ Worksheet</button>
          <button class="add-btn cs" onclick="openModal(${i},'cribsheet')">+ Crib Sheet</button>
          <button class="add-btn vid" onclick="openModal(${i},'video')">+ Video</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAll() {
  document.getElementById('units-container').innerHTML = UNITS.map(renderUnit).join('');
  applyFilter();
}

function toggleUnit(i) { document.getElementById(`unit-${i}`).classList.toggle('open'); }

function setFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); applyFilter();
}
function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  UNITS.forEach((u,i)=>{
    const el = document.getElementById(`unit-${i}`); if(!el) return;
    let show = true;
    if(activeFilter==='worksheet' && !u.worksheets.length) show=false;
    if(activeFilter==='cribsheet' && !u.cribsheets.length) show=false;
    if(activeFilter==='video'     && !u.videos.length)     show=false;
    if(q && !(u.title+' '+u.topics.join(' ')).toLowerCase().includes(q)) show=false;
    el.classList.toggle('hidden',!show);
  });
}
function filterUnits(){ applyFilter(); }

function openModal(ui, type) {
  modalContext={ui,type};
  const cfg={worksheet:['Add Worksheet / Problem Set','Title','PDF URL or Google Drive link'],cribsheet:['Add Crib Sheet','Title','PDF URL or Google Drive link'],video:['Add Video Lecture','Title','YouTube or video URL']};
  const [title,nl,ul]=cfg[type];
  document.getElementById('modal-title').textContent=title;
  document.getElementById('label-name').textContent=nl;
  document.getElementById('label-url').textContent=ul;
  document.getElementById('input-name').value='';
  document.getElementById('input-url').value='';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('input-name').focus(),100);
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); modalContext=null; }
function saveResource(){
  const name=document.getElementById('input-name').value.trim(), url=document.getElementById('input-url').value.trim();
  if(!name||!url){alert('Please fill in both fields.');return;}
  const {ui,type}=modalContext;
  const key=type==='worksheet'?'worksheets':type==='cribsheet'?'cribsheets':'videos';
  UNITS[ui][key].push({name,url,_user:true});
  saveUserAdded(); closeModal(); renderAll();
  setTimeout(()=>{ const el=document.getElementById(`unit-${ui}`); if(el&&!el.classList.contains('open'))el.classList.add('open'); },50);
}
function removeResource(ev,ui,key,ri){
  ev.preventDefault(); ev.stopPropagation();
  if(!confirm('Remove this resource?'))return;
  UNITS[ui][key].splice(ri,1);
  saveUserAdded(); renderAll();
  setTimeout(()=>{ const el=document.getElementById(`unit-${ui}`); if(el&&!el.classList.contains('open'))el.classList.add('open'); },50);
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open'))saveResource();
});

loadSaved();
renderAll();
</script>
</body>
</html>
